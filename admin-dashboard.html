<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard - asian.directory</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta name="description" content="CRM Dashboard for asian.directory">
    <meta name="theme-color" content="#FACC15">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link { transition: all 0.15s ease; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(250,204,21,0.15); color: #FACC15; }
        .sidebar-link.active { border-right: 3px solid #FACC15; }
        .stat-card { transition: transform 0.15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .bar-chart .bar { transition: width 0.5s ease; }
        .badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        .badge-active { background: #DEF7EC; color: #03543F; }
        .badge-pending { background: #FEF3C7; color: #92400E; }
        .badge-inactive { background: #F3F4F6; color: #6B7280; }
        .badge-verified { background: #DBEAFE; color: #1E40AF; }
        .badge-high { background: #FEE2E2; color: #991B1B; }
        .badge-medium { background: #FEF3C7; color: #92400E; }
        .badge-low { background: #DEF7EC; color: #03543F; }
        .badge-admin { background: #EDE9FE; color: #5B21B6; }
        .badge-editor { background: #DBEAFE; color: #1E40AF; }
        .badge-viewer { background: #F3F4F6; color: #6B7280; }
        .dark .badge-active { background: #064E3B; color: #6EE7B7; }
        .dark .badge-pending { background: #78350F; color: #FDE68A; }
        .dark .badge-inactive { background: #374151; color: #9CA3AF; }
        .dark .badge-verified { background: #1E3A5F; color: #93C5FD; }
        .dark .badge-high { background: #7F1D1D; color: #FCA5A5; }
        .dark .badge-medium { background: #78350F; color: #FDE68A; }
        .dark .badge-low { background: #064E3B; color: #6EE7B7; }
        .dark .badge-admin { background: #4C1D95; color: #C4B5FD; }
        .dark .badge-editor { background: #1E3A5F; color: #93C5FD; }
        .dark .badge-viewer { background: #374151; color: #9CA3AF; }
        .pipeline-col { min-height: 400px; }
        .pipeline-card { cursor: grab; }
        .pipeline-card:active { cursor: grabbing; opacity: 0.7; }
        .pipeline-col.drag-over { background: rgba(250,204,21,0.1); border-color: #FACC15; }
        .modal-overlay { backdrop-filter: blur(4px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #9CA3AF; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #4B5563; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
<div class="flex h-screen overflow-hidden">

        <div class="p-4 border-b border-gray-200 dark:border-gray-700">
            <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100">asian<span class="text-yellow-400">.directory</span></h1>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">CRM Dashboard</p>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto">

            <a href="#" data-page="apikeys" class="sidebar-link flex items-center gap-3 px-4 py-2.5 text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                API Keys
            </a>
            <a href="#" data-page="analytics" class="sidebar-link flex items-center gap-3 px-4 py-2.5 text-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>

    <!-- Main Content -->

<!-- Business Modal -->
<div id="business-modal" class="hidden fixed inset-0 z-50 modal-overlay bg-black/50 flex items-center justify-center p-4">

        <div class="sticky top-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4 flex justify-between items-center">
            <h2 id="modal-title" class="text-xl font-bold">Add Business</h2>
            <button onclick="closeModal()" class="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>

        <form id="business-form" class="p-6 space-y-4">
            <input type="hidden" id="form-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="block text-sm font-medium mb-1">Name *</label><input id="form-name" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></div>

                <div class="md:col-span-2"><label class="block text-sm font-medium mb-1">Description *</label><textarea id="form-description" required rows="3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></textarea></div>

                <div><label class="block text-sm font-medium mb-1">Phone</label><input id="form-phone" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></div>

                <div><label class="block text-sm font-medium mb-1">Website</label><input id="form-website" type="url" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></div>

                <div><label class="block text-sm font-medium mb-1">Keywords</label><input id="form-keywords" placeholder="comma-separated" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></div>

                <div class="md:col-span-2"><label class="block text-sm font-medium mb-1">Notes</label><textarea id="form-notes" rows="2" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></textarea></div>
                <div class="md:col-span-2 border-t border-gray-200 dark:border-gray-700 pt-4"><h3 class="text-sm font-semibold mb-3">Social Media</h3>

                        <input id="form-instagram" placeholder="Instagram" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-yellow-400 focus:outline-none">
                        <input id="form-facebook" placeholder="Facebook" class="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm focus:ring-2 focus:ring-yellow-400 focus:outline-none">

<script>
// ==================== CONFIG ====================
let API_BASE_URL;
if (window.location.hostname === 'localhost') {
    API_BASE_URL = 'http://localhost:3000/api';
} else if (window.location.hostname.includes('asian.directory')) {
    API_BASE_URL = 'https://csxbygix.up.railway.app/api';
} else {
    API_BASE_URL = window.location.protocol + '//' + window.location.hostname.replace('-8080', '-3000') + '/api';
}

// ==================== STATE ====================
let currentUser = null;
let currentPage = 'dashboard';
let allBusinesses = [];
let dashboardData = null;

// ==================== AUTH ====================
function getToken() { return localStorage.getItem('adminToken'); }
function logout() { localStorage.removeItem('adminToken'); window.location.href = 'admin-login.html'; }

const token = getToken();
if (!token) window.location.href = 'admin-login.html';

document.getElementById('logout-btn').addEventListener('click', logout);

// ==================== API HELPERS ====================
async function api(path, options = {}) {
    const opts = { headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }, ...options };
    if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
    try {
        const res = await fetch(`${API_BASE_URL}${path}`, opts);
        const data = await res.json();
        if (!data.success && res.status === 401) { logout(); return null; }
        return data;
    } catch (e) { console.error('API error:', e); return { success: false, error: e.message }; }
}

function toast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const c = document.getElementById('toast-content');
    c.textContent = msg;
    c.className = `px-4 py-3 rounded-lg shadow-lg text-sm font-medium ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 4000);
}

function badge(value, type) {
    const cls = `badge badge-${value}`;
    return `<span class="${cls}">${value}</span>`;
}

function formatDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function stageLabel(s) {
    const labels = { new_lead: 'New Lead', contacted: 'Contacted', in_review: 'In Review', verified: 'Verified', active_listing: 'Active', inactive: 'Inactive' };
    return labels[s] || s;
}

// ==================== NAVIGATION ====================
document.querySelectorAll('.sidebar-link').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.dataset.page;
        navigateTo(page);
    });
});

function navigateTo(page) {
    currentPage = page;
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
    document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1).replace('apikeys', 'API Keys');
    document.getElementById('sidebar').classList.remove('open');
    renderPage(page);
}

document.getElementById('menu-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// ==================== THEME ====================
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
}
document.getElementById('theme-toggle').addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});

// ==================== PAGE RENDERERS ====================
async function renderPage(page) {
    const main = document.getElementById('main-content');
    main.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-8 h-8 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin"></div></div>';

    switch(page) {
        case 'dashboard': await renderDashboard(main); break;
        case 'businesses': await renderBusinesses(main); break;
        case 'pipeline': await renderPipeline(main); break;
        case 'users': await renderUsers(main); break;
        case 'apikeys': await renderApiKeys(main); break;
        case 'analytics': await renderAnalytics(main); break;
        case 'audit': await renderAuditLog(main); break;
        default: main.innerHTML = '<p>Page not found</p>';
    }
}

// --- DASHBOARD ---
async function renderDashboard(el) {
    const res = await api('/crm/dashboard');
    if (!res?.success) { el.innerHTML = '<p class="text-red-500">Failed to load dashboard</p>'; return; }
    const d = res.data;
    dashboardData = d;

    const statCards = [
        { label: 'Total Businesses', value: d.businesses.total, color: 'yellow' },
        { label: 'Active Listings', value: d.businesses.byStatus.find(s => s.status === 'active')?.count || 0, color: 'green' },
        { label: 'Searches Today', value: d.conversations.today, color: 'blue' },
        { label: 'Active API Keys', value: d.apiKeys.active, color: 'purple' },
        { label: 'Total Users', value: d.users.total, color: 'pink' },
        { label: 'Recent Activity', value: d.recentActivity, color: 'orange' },
    ];

function renderBarChart(items, labelKey, valueKey, total) {
    if (!items || !items.length) return '<p class="text-sm text-gray-400">No data</p>';
    const max = Math.max(...items.map(i => parseInt(i[valueKey]) || 0));
    return items.map(item => {
        const val = parseInt(item[valueKey]) || 0;
        const pct = max > 0 ? (val / max * 100) : 0;
        return `<div class="flex items-center gap-3"><span class="w-24 text-xs text-gray-600 dark:text-gray-400 truncate">${item[labelKey] || 'Unknown'}</span><div class="flex-1 bg-gray-100 dark:bg-gray-700 rounded-full h-5 overflow-hidden"><div class="bar bg-yellow-400 h-full rounded-full" style="width:${pct}%"></div></div><span class="w-8 text-xs font-medium text-right">${val}</span></div>`;
    }).join('');
}

function renderBusinessTable() {
    const search = (document.getElementById('biz-search')?.value || '').toLowerCase();
    const status = document.getElementById('biz-filter-status')?.value || '';
    const category = document.getElementById('biz-filter-category')?.value || '';
    const country = document.getElementById('biz-filter-country')?.value || '';

    let filtered = allBusinesses.filter(b => {
        if (search && !`${b.name} ${b.category} ${b.address} ${b.country}`.toLowerCase().includes(search)) return false;
        if (status && b.status !== status) return false;
        if (category && b.category !== category) return false;
        if (country && b.country !== country) return false;
        return true;
    });

    const tbody = document.getElementById('biz-table-body');
    if (!tbody) return;
    tbody.innerHTML = filtered.length === 0
        ? '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">No businesses found</td></tr>'
        : filtered.map(b => `
            <tr class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer" onclick="openEditBusiness(${b.id})">
                <td class="px-4 py-3 font-medium">${b.name}</td>
                <td class="px-4 py-3 hidden sm:table-cell text-gray-500 dark:text-gray-400">${b.category}</td>
                <td class="px-4 py-3 hidden md:table-cell text-gray-500 dark:text-gray-400">${b.country || '-'}</td>
                <td class="px-4 py-3">${badge(b.status, 'status')}</td>
                <td class="px-4 py-3 hidden lg:table-cell text-gray-500 dark:text-gray-400">${stageLabel(b.pipeline_stage)}</td>
                <td class="px-4 py-3 hidden lg:table-cell">${badge(b.priority, 'priority')}</td>
                <td class="px-4 py-3 text-right"><button class="text-yellow-500 hover:text-yellow-600 text-sm font-medium" onclick="event.stopPropagation();openEditBusiness(${b.id})">Edit</button></td>
            </tr>
        `).join('');
}

async function renderPipeline(el) {

    const stages = ['new_lead', 'contacted', 'in_review', 'verified', 'active_listing', 'inactive'];
    const colors = { new_lead: 'border-blue-400', contacted: 'border-yellow-400', in_review: 'border-orange-400', verified: 'border-green-400', active_listing: 'border-emerald-400', inactive: 'border-gray-400' };

    el.innerHTML = `
        <div class="flex gap-4 overflow-x-auto pb-4" style="min-height:500px">
            ${stages.map(stage => `
                <div class="pipeline-col flex-shrink-0 w-64 bg-gray-100 dark:bg-gray-800 rounded-xl p-3 border-t-4 ${colors[stage]}" data-stage="${stage}"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"

                                 draggable="true" data-id="${b.id}"
                                 ondragstart="event.dataTransfer.setData('text/plain','${b.id}')"
                                 onclick="openEditBusiness(${b.id})">
                                <div class="font-medium text-sm">${b.name}</div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">${b.category} ${b.country ? '- ' + b.country : ''}</div>
                                <div class="mt-2">${badge(b.priority, 'priority')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

async function handleDrop(event, newStage) {
    event.preventDefault();
    const bizId = parseInt(event.dataTransfer.getData('text/plain'));
    if (!bizId) return;

    const res = await api(`/businesses/${bizId}`, { method: 'PATCH', body: { field: 'pipeline_stage', value: newStage } });
    if (res?.success) {
        toast(`Moved to ${stageLabel(newStage)}`);
        renderPipeline(document.getElementById('main-content'));
    } else {
        toast(res?.error || 'Failed to update', 'error');
    }
}

async function createApiKey() {
    const name = document.getElementById('key-name').value.trim();
    if (!name) { toast('Key name is required', 'error'); return; }
    const perms = [];
    if (document.getElementById('perm-read').checked) perms.push('read');
    if (document.getElementById('perm-write').checked) perms.push('write');
    const rate = parseInt(document.getElementById('key-rate').value) || 100;

    const res = await api('/keys', { method: 'POST', body: { name, permissions: perms, rate_limit: rate } });
    if (res?.success) {
        document.getElementById('new-key-display').classList.remove('hidden');
        document.getElementById('new-key-value').textContent = res.data.key;
        document.getElementById('key-name').value = '';
        toast('API key created');
    } else toast(res?.error || 'Failed', 'error');
}

async function revokeKey(id) {
    if (!confirm('Revoke this API key?')) return;
    const res = await api(`/keys/${id}`, { method: 'DELETE' });
    if (res?.success) { toast('Key revoked'); renderApiKeys(document.getElementById('main-content')); }
    else toast(res?.error || 'Failed', 'error');
}

                        <td class="px-4 py-3">${log.display_name || log.username || 'System'}</td>
                        <td class="px-4 py-3"><span class="text-xs font-medium px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700">${log.action}</span></td>
                        <td class="px-4 py-3 text-gray-500">${log.entity_type}${log.entity_id ? ' #'+log.entity_id : ''}</td>
                        <td class="px-4 py-3 text-xs text-gray-400 hidden md:table-cell max-w-xs truncate">${log.new_values ? JSON.stringify(log.new_values) : '-'}</td>
                    </tr>
                `).join('')}</tbody>
            </table>
        </div>
    `;
}

// ==================== MODAL HANDLERS ====================
function openModal() { document.getElementById('business-modal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function closeModal() { document.getElementById('business-modal').classList.add('hidden'); document.body.style.overflow = ''; document.getElementById('business-form').reset(); document.getElementById('form-id').value = ''; }

function openAddBusiness() {
    document.getElementById('modal-title').textContent = 'Add Business';
    document.getElementById('delete-btn').classList.add('hidden');
    document.getElementById('form-id').value = '';
    document.getElementById('business-form').reset();
    openModal();
}

async function openEditBusiness(id) {
    const res = await api(`/businesses/${id}`);
    if (!res?.success) { toast('Failed to load business', 'error'); return; }
    const b = res.data;

    document.getElementById('modal-title').textContent = 'Edit Business';
    document.getElementById('delete-btn').classList.remove('hidden');
    document.getElementById('form-id').value = b.id;
    document.getElementById('form-name').value = b.name || '';
    document.getElementById('form-category').value = b.category || '';
    document.getElementById('form-country').value = b.country || '';
    document.getElementById('form-city').value = b.city || '';
    document.getElementById('form-address').value = b.address || '';
    document.getElementById('form-description').value = b.description || '';
    document.getElementById('form-phone').value = b.phone || '';
    document.getElementById('form-email').value = b.email || '';
    document.getElementById('form-website').value = b.website || '';
    document.getElementById('form-contact').value = b.contact_person || '';
    document.getElementById('form-keywords').value = (b.keywords || []).join(', ');
    document.getElementById('form-status').value = b.status || 'pending';
    document.getElementById('form-pipeline').value = b.pipeline_stage || 'new_lead';
    document.getElementById('form-priority').value = b.priority || 'medium';
    document.getElementById('form-notes').value = b.notes || '';
    const s = b.socials || {};
    document.getElementById('form-instagram').value = s.instagram || '';
    document.getElementById('form-facebook').value = s.facebook || '';
    document.getElementById('form-x').value = s.x || '';
    document.getElementById('form-linkedin').value = s.linkedin || '';
    openModal();
}

document.getElementById('business-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('form-id').value;
    const body = {
        name: document.getElementById('form-name').value,
        category: document.getElementById('form-category').value,
        description: document.getElementById('form-description').value,
        address: document.getElementById('form-address').value,
        country: document.getElementById('form-country').value || null,
        city: document.getElementById('form-city').value || null,
        phone: document.getElementById('form-phone').value || null,
        email: document.getElementById('form-email').value || null,
        website: document.getElementById('form-website').value || null,
        contact_person: document.getElementById('form-contact').value || null,
        keywords: document.getElementById('form-keywords').value.split(',').map(k=>k.trim()).filter(k=>k),
        status: document.getElementById('form-status').value,
        pipeline_stage: document.getElementById('form-pipeline').value,
        priority: document.getElementById('form-priority').value,
        notes: document.getElementById('form-notes').value || null,
        socials: {
            instagram: document.getElementById('form-instagram').value || null,
            facebook: document.getElementById('form-facebook').value || null,
            x: document.getElementById('form-x').value || null,
            linkedin: document.getElementById('form-linkedin').value || null
        }
    };

    const res = id
        ? await api(`/businesses/${id}`, { method: 'PUT', body })
        : await api('/businesses', { method: 'POST', body });

    if (res?.success) {
        toast(id ? 'Business updated' : 'Business added');
        closeModal();
        navigateTo(currentPage);
    } else toast(res?.error || 'Failed to save', 'error');
});

async function deleteBusiness() {
    const id = document.getElementById('form-id').value;
    if (!id || !confirm('Delete this business? This cannot be undone.')) return;
    const res = await api(`/businesses/${id}`, { method: 'DELETE' });
    if (res?.success) { toast('Business deleted'); closeModal(); navigateTo(currentPage); }
    else toast(res?.error || 'Failed to delete', 'error');
}

async function exportData(format) {
    const res = await api(`/businesses/export?format=${format}`);
    if (format === 'csv' || (res && typeof res === 'string')) {
        // For CSV, open in new tab via direct URL
        window.open(`${API_BASE_URL}/businesses/export?format=csv`, '_blank');
        return;
    }
    if (res?.success) {
        const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'businesses.json'; a.click();
        URL.revokeObjectURL(url);
        toast('Exported successfully');
    } else toast('Export failed', 'error');
}

// ==================== INITIALIZATION ====================
async function init() {
    try {
        const verifyRes = await api('/auth/verify');
        if (!verifyRes?.success) { logout(); return; }

        currentUser = verifyRes.user;
        document.getElementById('user-display').textContent = currentUser.displayName || currentUser.username;
        document.getElementById('role-badge').textContent = currentUser.role;
        document.getElementById('role-badge').className = `badge badge-${currentUser.role}`;

        // Hide admin-only nav items for non-admins
        if (currentUser.role !== 'admin') {
            document.getElementById('nav-users')?.classList.add('hidden');
            document.getElementById('nav-audit')?.classList.add('hidden');
        }

        navigateTo('dashboard');
    } catch (e) {
        console.error('Init error:', e);
        logout();
    }
}

// Make functions global
window.openAddBusiness = openAddBusiness;
window.openEditBusiness = openEditBusiness;
window.deleteBusiness = deleteBusiness;
window.exportData = exportData;
window.handleDrop = handleDrop;
window.updateRole = updateRole;
window.toggleActive = toggleActive;
window.createApiKey = createApiKey;
window.revokeKey = revokeKey;
window.closeModal = closeModal;

init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - asian.directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-200">
    
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">asian.directory</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Admin Dashboard</p>
                </div>
                <div class="flex items-center gap-4">
                    <span id="username-display" class="text-sm text-gray-600 dark:text-gray-300"></span>
                    <button id="logout-btn" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
            <!-- Navigation Tabs -->
            <div class="mb-8 border-b border-gray-200 dark:border-gray-700">
                <nav class="flex gap-4">
                    <button id="tab-add-business" class="tab-btn px-4 py-2 border-b-2 border-yellow-400 text-yellow-500 font-medium">Add Business</button>
                    <button id="tab-manage-businesses" class="tab-btn px-4 py-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">Manage Businesses</button>
                </nav>
            </div>

            <!-- Alert messages -->
            <div id="alert-message" class="hidden mb-6 p-4 rounded-lg text-sm"></div>

            <!-- Add Business Section -->
            <div id="section-add-business" class="section-content">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 max-w-3xl">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6">Add New Business</h2>
                    
                    <form id="add-business-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label for="business-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Business Name *</label>
                                <input type="text" id="business-name" name="name" required 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="e.g., Ichiran Ramen">
                            </div>

                            <div>
                                <label for="business-category" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Business Type/Category *</label>
                                <input type="text" id="business-category" name="category" required 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="e.g., Restaurant, Cafe, Hotel">
                            </div>

                            <div>
                                <label for="business-phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
                                <input type="tel" id="business-phone" name="phone" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="+81 3-5428-3444">
                            </div>

                            <div class="md:col-span-2">
                                <label for="business-address" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Location/Address *</label>
                                <input type="text" id="business-address" name="address" required 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="e.g., Shibuya, Tokyo, Japan">
                            </div>

                            <div class="md:col-span-2">
                                <label for="business-description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description *</label>
                                <textarea id="business-description" name="description" required rows="4"
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="Provide a detailed description of the business"></textarea>
                            </div>

                            <div>
                                <label for="business-contact" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Contact Person</label>
                                <input type="text" id="business-contact" name="contact" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="Name of contact person">
                            </div>

                            <div>
                                <label for="business-website" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Website</label>
                                <input type="url" id="business-website" name="website" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="https://example.com">
                            </div>

                            <div class="md:col-span-2">
                                <label for="business-keywords" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Keywords (comma-separated)</label>
                                <input type="text" id="business-keywords" name="keywords" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                    placeholder="e.g., ramen, noodle, japanese, food">
                            </div>

                            <!-- Social Media Links -->
                            <div class="md:col-span-2 border-t border-gray-200 dark:border-gray-700 pt-4">
                                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Social Media (Optional)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label for="social-instagram" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Instagram</label>
                                        <input type="text" id="social-instagram" name="instagram" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                            placeholder="username">
                                    </div>
                                    <div>
                                        <label for="social-facebook" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Facebook</label>
                                        <input type="text" id="social-facebook" name="facebook" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                            placeholder="username">
                                    </div>
                                    <div>
                                        <label for="social-x" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">X (Twitter)</label>
                                        <input type="text" id="social-x" name="x" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                            placeholder="username">
                                    </div>
                                    <div>
                                        <label for="social-linkedin" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">LinkedIn</label>
                                        <input type="text" id="social-linkedin" name="linkedin" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                            placeholder="username">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <button type="submit" id="submit-btn" 
                                class="flex-1 bg-yellow-400 text-gray-900 py-3 rounded-lg hover:bg-yellow-500 transition-colors font-medium">
                                Add Business
                            </button>
                            <button type="reset" 
                                class="px-6 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 py-3 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                                Clear Form
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Manage Businesses Section -->
            <div id="section-manage-businesses" class="section-content hidden">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Manage Businesses</h2>
                        <button id="refresh-list-btn" class="px-4 py-2 bg-yellow-400 text-gray-900 rounded-lg hover:bg-yellow-500 transition-colors">
                            Refresh List
                        </button>
                    </div>
                    
                    <div id="businesses-list" class="space-y-4">
                        <p class="text-gray-500 dark:text-gray-400">Loading businesses...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Edit Business Modal -->
        <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-8 py-4 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Edit Business</h2>
                    <button id="close-modal-btn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="p-8">
                    <form id="edit-business-form" class="space-y-6">
                        <input type="hidden" id="edit-business-id">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label for="edit-business-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Business Name *</label>
                                <input type="text" id="edit-business-name" required 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                            </div>

                            <div>
                                <label for="edit-business-category" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Business Type/Category *</label>
                                <input type="text" id="edit-business-category" required 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                            </div>

                            <div>
                                <label for="edit-business-phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
                                <input type="tel" id="edit-business-phone" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                            </div>

                            <div class="md:col-span-2">
                                <label for="edit-business-address" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Location/Address *</label>
                                <input type="text" id="edit-business-address" required 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                            </div>

                            <div class="md:col-span-2">
                                <label for="edit-business-description" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description *</label>
                                <textarea id="edit-business-description" required rows="4"
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400"></textarea>
                            </div>

                            <div>
                                <label for="edit-business-website" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Website</label>
                                <input type="url" id="edit-business-website" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                            </div>

                            <div>
                                <label for="edit-business-keywords" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Keywords</label>
                                <input type="text" id="edit-business-keywords" 
                                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                    placeholder="e.g., ramen, noodle, japanese">
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Separate keywords with commas</p>
                            </div>

                            <!-- Social Media Links -->
                            <div class="md:col-span-2">
                                <h3 class="text-lg font-medium text-gray-700 dark:text-gray-300 mb-4">Social Media Links</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label for="edit-instagram" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Instagram</label>
                                        <input type="text" id="edit-instagram" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                            placeholder="username">
                                    </div>
                                    <div>
                                        <label for="edit-facebook" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Facebook</label>
                                        <input type="text" id="edit-facebook" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                            placeholder="username">
                                    </div>
                                    <div>
                                        <label for="edit-x" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">X (Twitter)</label>
                                        <input type="text" id="edit-x" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                            placeholder="username">
                                    </div>
                                    <div>
                                        <label for="edit-linkedin" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">LinkedIn</label>
                                        <input type="text" id="edit-linkedin" 
                                            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                            placeholder="username">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-4 pt-4">
                            <button type="submit" class="flex-1 px-6 py-3 bg-yellow-400 text-gray-900 rounded-lg hover:bg-yellow-500 transition-colors font-medium">
                                Save Changes
                            </button>
                            <button type="button" id="delete-business-btn" class="px-6 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-medium">
                                Delete Business
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-4">
            <div class="max-w-7xl mx-auto px-4 text-center text-xs text-gray-400 dark:text-gray-500">
                <p>© 2026 asian.directory. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Auto-detect environment and use appropriate API URL
        let API_BASE_URL;
        if (window.location.hostname === 'localhost') {
            API_BASE_URL = 'http://localhost:3000/api';
        } else if (window.location.hostname.includes('asian.directory')) {
            // Production - Backend hosted on Railway
            API_BASE_URL = 'https://csxbygix.up.railway.app/api';
        } else {
            // Codespaces
            API_BASE_URL = window.location.protocol + '//' + window.location.hostname.replace('-8080', '-3000') + '/api';
        }
        
        // --- AUTH FUNCTIONS ---
        function getAuthToken() {
            return localStorage.getItem('adminToken');
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin-login.html';
        }

        // --- CHECK AUTHENTICATION ---
        const token = getAuthToken();
        if (!token) {
            window.location.href = 'admin-login.html';
        }

        // Verify token is valid
        fetch(`${API_BASE_URL}/auth/verify`, {
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(data => {
            if (!data.success) {
                logout();
            } else {
                document.getElementById('username-display').textContent = `Welcome, ${data.user.username}`;
            }
        })
        .catch(err => {
            console.error('Auth verification error:', err);
            logout();
        });

        // --- DOM ELEMENTS ---
        const logoutBtn = document.getElementById('logout-btn');
        const addBusinessForm = document.getElementById('add-business-form');
        const alertMessage = document.getElementById('alert-message');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const sections = document.querySelectorAll('.section-content');

        // --- UTILITY FUNCTIONS ---
        function showAlert(message, type = 'error') {
            alertMessage.textContent = message;
            alertMessage.className = `mb-6 p-4 rounded-lg text-sm ${
                type === 'success' 
                    ? 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200' 
                    : 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200'
            }`;
            alertMessage.classList.remove('hidden');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertMessage.classList.add('hidden');
            }, 5000);
        }

        // --- TAB NAVIGATION ---
        tabButtons.forEach((btn, index) => {
            btn.addEventListener('click', () => {
                // Update tab styles
                tabButtons.forEach(b => {
                    b.classList.remove('border-yellow-400', 'text-yellow-500');
                    b.classList.add('border-transparent', 'text-gray-500');
                });
                btn.classList.remove('border-transparent', 'text-gray-500');
                btn.classList.add('border-yellow-400', 'text-yellow-500');

                // Show corresponding section
                sections.forEach(section => section.classList.add('hidden'));
                sections[index].classList.remove('hidden');

                // Load businesses list if switching to manage tab
                if (btn.id === 'tab-manage-businesses') {
                    loadBusinessesList();
                }
            });
        });

        // --- LOGOUT ---
        logoutBtn.addEventListener('click', logout);

        // --- ADD BUSINESS FORM ---
        addBusinessForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Adding Business...';

            // Collect form data
            const formData = {
                name: document.getElementById('business-name').value,
                category: document.getElementById('business-category').value,
                description: document.getElementById('business-description').value,
                address: document.getElementById('business-address').value,
                phone: document.getElementById('business-phone').value || null,
                website: document.getElementById('business-website').value || null,
                keywords: document.getElementById('business-keywords').value.split(',').map(k => k.trim()).filter(k => k),
                socials: {
                    instagram: document.getElementById('social-instagram').value || null,
                    facebook: document.getElementById('social-facebook').value || null,
                    x: document.getElementById('social-x').value || null,
                    linkedin: document.getElementById('social-linkedin').value || null
                }
            };

            try {
                const response = await fetch(`${API_BASE_URL}/businesses`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Business added successfully!', 'success');
                    addBusinessForm.reset();
                } else {
                    showAlert(data.error || 'Failed to add business.');
                }
            } catch (error) {
                console.error('Error adding business:', error);
                showAlert('Unable to connect to the server. Please try again later.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Business';
            }
        });

        // --- LOAD BUSINESSES LIST ---
        async function loadBusinessesList() {
            const listContainer = document.getElementById('businesses-list');
            listContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Loading businesses...</p>';

            try {
                const response = await fetch(`${API_BASE_URL}/businesses`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    listContainer.innerHTML = data.data.map(business => `
                        <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-1 cursor-pointer" onclick="openEditModal(${business.id})">
                                    <h3 class="font-bold text-lg text-gray-800 dark:text-gray-100 hover:text-yellow-500">${business.name}</h3>
                                    <p class="text-sm text-gray-600 dark:text-gray-400 mt-1">${business.category} • ${business.address}</p>
                                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">${business.description.substring(0, 150)}${business.description.length > 150 ? '...' : ''}</p>
                                    ${business.phone ? `<p class="text-sm text-gray-500 dark:text-gray-400 mt-2">📞 ${business.phone}</p>` : ''}
                                    ${business.website ? `<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">🌐 <a href="${business.website}" target="_blank" class="text-yellow-500 hover:underline" onclick="event.stopPropagation()">${business.website}</a></p>` : ''}
                                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-2">Click to edit</p>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="openEditModal(${business.id})" class="px-4 py-2 bg-yellow-400 text-gray-900 rounded-lg hover:bg-yellow-500 transition-colors text-sm font-medium">
                                        Edit
                                    </button>
                                    <div class="text-xs text-gray-400 dark:text-gray-500 text-center">
                                        ID: ${business.id}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No businesses found.</p>';
                }
            } catch (error) {
                console.error('Error loading businesses:', error);
                listContainer.innerHTML = '<p class="text-red-500">Failed to load businesses.</p>';
            }
        }

        // Refresh button
        document.getElementById('refresh-list-btn').addEventListener('click', loadBusinessesList);

        // --- EDIT MODAL FUNCTIONS ---
        const editModal = document.getElementById('edit-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const editBusinessForm = document.getElementById('edit-business-form');
        const deleteBusinessBtn = document.getElementById('delete-business-btn');
        
        // Make openEditModal globally accessible
        window.openEditModal = async function(businessId) {
            try {
                // Fetch business details
                const response = await fetch(`${API_BASE_URL}/businesses/${businessId}`);
                const data = await response.json();
                
                if (data.success) {
                    const business = data.data;
                    
                    // Populate form
                    document.getElementById('edit-business-id').value = business.id;
                    document.getElementById('edit-business-name').value = business.name;
                    document.getElementById('edit-business-category').value = business.category;
                    document.getElementById('edit-business-phone').value = business.phone || '';
                    document.getElementById('edit-business-address').value = business.address;
                    document.getElementById('edit-business-description').value = business.description;
                    document.getElementById('edit-business-website').value = business.website || '';
                    document.getElementById('edit-business-keywords').value = business.keywords ? business.keywords.join(', ') : '';
                    
                    // Populate social media
                    const socials = business.socials || {};
                    document.getElementById('edit-instagram').value = socials.instagram || '';
                    document.getElementById('edit-facebook').value = socials.facebook || '';
                    document.getElementById('edit-x').value = socials.x || '';
                    document.getElementById('edit-linkedin').value = socials.linkedin || '';
                    
                    // Show modal
                    editModal.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                } else {
                    showAlert('Failed to load business details.');
                }
            } catch (error) {
                console.error('Error fetching business:', error);
                showAlert('Unable to load business details.');
            }
        };
        
        function closeEditModal() {
            editModal.classList.add('hidden');
            document.body.style.overflow = 'auto';
            editBusinessForm.reset();
        }
        
        closeModalBtn.addEventListener('click', closeEditModal);
        
        // Close modal on background click
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) {
                closeEditModal();
            }
        });
        
        // Handle edit form submission
        editBusinessForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const businessId = document.getElementById('edit-business-id').value;
            const keywords = document.getElementById('edit-business-keywords').value
                .split(',')
                .map(k => k.trim())
                .filter(k => k.length > 0);
            
            const formData = {
                name: document.getElementById('edit-business-name').value,
                category: document.getElementById('edit-business-category').value,
                description: document.getElementById('edit-business-description').value,
                address: document.getElementById('edit-business-address').value,
                phone: document.getElementById('edit-business-phone').value || null,
                website: document.getElementById('edit-business-website').value || null,
                keywords: keywords,
                socials: {
                    instagram: document.getElementById('edit-instagram').value || null,
                    facebook: document.getElementById('edit-facebook').value || null,
                    x: document.getElementById('edit-x').value || null,
                    linkedin: document.getElementById('edit-linkedin').value || null
                }
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/businesses/${businessId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Business updated successfully!', 'success');
                    closeEditModal();
                    loadBusinessesList();
                } else {
                    showAlert(data.error || 'Failed to update business.');
                }
            } catch (error) {
                console.error('Error updating business:', error);
                showAlert('Unable to update business. Please try again.');
            }
        });
        
        // Handle delete button
        deleteBusinessBtn.addEventListener('click', async () => {
            const businessId = document.getElementById('edit-business-id').value;
            const businessName = document.getElementById('edit-business-name').value;
            
            if (confirm(`Are you sure you want to delete "${businessName}"? This action cannot be undone.`)) {
                try {
                    const response = await fetch(`${API_BASE_URL}/businesses/${businessId}`, {
                        method: 'DELETE',
                        headers: { 
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        showAlert('Business deleted successfully!', 'success');
                        closeEditModal();
                        loadBusinessesList();
                    } else {
                        showAlert(data.error || 'Failed to delete business.');
                    }
                } catch (error) {
                    console.error('Error deleting business:', error);
                    showAlert('Unable to delete business. Please try again.');
                }
            }
        });
    </script>
</body>
</html>

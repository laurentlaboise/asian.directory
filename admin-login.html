<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - asian.directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-200">
    
    <div class="min-h-screen flex flex-col items-center justify-center px-4">
        <!-- Back to Home -->
        <div class="w-full max-w-md mb-4">
            <a href="index.html" class="text-sm text-gray-500 hover:text-yellow-500 transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Home
            </a>
        </div>

        <!-- Login Form Container -->
        <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">asian.directory</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Admin Login</p>
            </div>

            <!-- Alert messages -->
            <div id="alert-message" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                        placeholder="Enter your username">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                        placeholder="Enter your password">
                </div>

                <button type="submit" id="login-btn" 
                    class="w-full bg-yellow-400 text-gray-900 py-3 rounded-lg hover:bg-yellow-500 transition-colors font-medium">
                    Login
                </button>
            </form>

            <!-- Create Account -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Don't have an account? 
                    <button id="toggle-register" class="text-yellow-500 hover:text-yellow-600 font-medium">Create Account</button>
                </p>
            </div>

            <!-- Register Form (Hidden by default) -->
            <form id="register-form" class="space-y-4 mt-6 hidden">
                <div class="border-t border-gray-200 dark:border-gray-700 pt-6">
                    <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">Create New Account</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label for="reg-username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Username</label>
                            <input type="text" id="reg-username" name="username" required 
                                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                placeholder="Choose a username">
                        </div>

                        <div>
                            <label for="reg-password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                            <input type="password" id="reg-password" name="password" required 
                                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                placeholder="Choose a password">
                        </div>

                        <div>
                            <label for="reg-password-confirm" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Confirm Password</label>
                            <input type="password" id="reg-password-confirm" name="password-confirm" required 
                                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                                placeholder="Confirm your password">
                        </div>

                        <button type="submit" id="register-btn" 
                            class="w-full bg-yellow-400 text-gray-900 py-3 rounded-lg hover:bg-yellow-500 transition-colors font-medium">
                            Create Account
                        </button>

                        <button type="button" id="cancel-register" 
                            class="w-full bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors">
                            Cancel
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-gray-400 dark:text-gray-500">
            <p>© 2026 asian.directory. All rights reserved.</p>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Auto-detect environment and use appropriate API URL
        let API_BASE_URL;
        if (window.location.hostname === 'localhost') {
            API_BASE_URL = 'http://localhost:3000/api';
        } else if (window.location.hostname.includes('asian.directory')) {
            // Production
            API_BASE_URL = 'https://asiandirectory-production-7ec4.up.railway.app/api';
        } else {
            // Codespaces
            API_BASE_URL = window.location.protocol + '//' + window.location.hostname.replace('-8080', '-3000') + '/api';
        }
        
        // --- DOM ELEMENTS ---
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const toggleRegisterBtn = document.getElementById('toggle-register');
        const cancelRegisterBtn = document.getElementById('cancel-register');
        const alertMessage = document.getElementById('alert-message');

        // --- UTILITY FUNCTIONS ---
        function showAlert(message, type = 'error') {
            alertMessage.textContent = message;
            alertMessage.className = `mb-4 p-3 rounded-lg text-sm ${
                type === 'success' 
                    ? 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200' 
                    : 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200'
            }`;
            alertMessage.classList.remove('hidden');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertMessage.classList.add('hidden');
            }, 5000);
        }

        function saveAuthToken(token) {
            localStorage.setItem('adminToken', token);
        }

        function getAuthToken() {
            return localStorage.getItem('adminToken');
        }

        // --- TOGGLE REGISTER FORM ---
        toggleRegisterBtn.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            toggleRegisterBtn.parentElement.classList.add('hidden');
        });

        cancelRegisterBtn.addEventListener('click', () => {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            toggleRegisterBtn.parentElement.classList.remove('hidden');
            registerForm.reset();
        });

        // --- LOGIN FORM HANDLER ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    saveAuthToken(data.token);
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Login failed. Please check your credentials.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Unable to connect to the server. Please try again later.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // --- REGISTER FORM HANDLER ---
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const passwordConfirm = document.getElementById('reg-password-confirm').value;
            const registerBtn = document.getElementById('register-btn');

            // Validate passwords match
            if (password !== passwordConfirm) {
                showAlert('Passwords do not match!');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters long.');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';

            console.log('Attempting registration to:', `${API_BASE_URL}/auth/register`);
            console.log('Username:', username);

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (data.success) {
                    showAlert('Account created successfully! You can now login.', 'success');
                    registerForm.reset();
                    setTimeout(() => {
                        cancelRegisterBtn.click();
                    }, 2000);
                } else {
                    showAlert(data.error || 'Failed to create account. Username may already exist.');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Unable to connect to the server. Please try again later.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });

        // --- CHECK IF ALREADY LOGGED IN ---
        if (getAuthToken()) {
            // Verify token is still valid
            fetch(`${API_BASE_URL}/auth/verify`, {
                headers: { 'Authorization': `Bearer ${getAuthToken()}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Already logged in, redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                }
            })
            .catch(err => console.log('Token verification failed'));
        }
    </script>
</body>
</html>

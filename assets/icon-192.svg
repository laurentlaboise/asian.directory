      <!-- Torii secondary beam (nuki) -->
      <rect x="29" y="33" width="38" height="4" rx="1"/>
      <!-- Left pillar -->
      <rect x="32" y="24" width="5" height="40" rx="1"/>
      <!-- Right pillar -->

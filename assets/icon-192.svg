<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <!-- 192x192 app icon -->

  <!-- Background circle - dark -->
  <circle cx="96" cy="96" r="92" fill="#111827"/>

  <!-- Location Pin - centered -->
  <g transform="translate(48, 20)">
    <!-- Pin shape - yellow -->
    <path d="M48 8C28.12 8 12 24.12 12 44c0 28 31.2 60 34.56 63.36a2 2 0 0 0 2.88 0C52.8 104 84 72 84 44 84 24.12 67.88 8 48 8z" fill="#FACC15"/>


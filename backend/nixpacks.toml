# Nixpacks configuration for asian.directory backend
# Railway root directory: /backend
# This file is what Railway reads for build configuration.

[phases.setup]
nixPkgs = ['nodejs_18', 'npm-9_x', 'python311']

[phases.install]
cmds = ['npm ci']

[phases.build]
cmds = []

[start]
cmd = 'node server.js'

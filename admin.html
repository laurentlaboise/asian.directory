<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - asian.directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

    <div class="min-h-screen py-8">
        <div class="max-w-4xl mx-auto px-4">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-gray-800 dark:text-gray-100 mb-2">Admin Panel</h1>
                <p class="text-gray-500 dark:text-gray-400">Manage businesses in asian.directory</p>
                <a href="/index.html" class="text-yellow-500 hover:text-yellow-600 text-sm mt-2 inline-block">← Back to Directory</a>
            </div>

            <!-- Tabs -->
            <div class="mb-6 border-b border-gray-200 dark:border-gray-700">
                <nav class="flex gap-4">
                    <button id="tab-add" class="tab-button px-4 py-2 border-b-2 border-yellow-500 text-yellow-500 font-medium">
                        Add Business
                    </button>
                    <button id="tab-list" class="tab-button px-4 py-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 font-medium">
                        View Businesses
                    </button>
                </nav>
            </div>

            <!-- Add Business Form -->
            <div id="add-business-section" class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-gray-100">Add New Business</h2>
                
                <form id="business-form" class="space-y-4">
                    <!-- Required Fields -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Business Name *</label>
                        <input type="text" name="name" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="e.g., Ichiran Ramen">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Category *</label>
                        <input type="text" name="category" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="e.g., Restaurant, Cafe, Attraction">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Description *</label>
                        <textarea name="description" required rows="3" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="Detailed description of the business"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Address *</label>
                        <input type="text" name="address" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="e.g., Shibuya, Tokyo, Japan">
                    </div>

                    <!-- Optional Fields -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Website</label>
                        <input type="url" name="website" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="https://example.com">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Phone</label>
                        <input type="tel" name="phone" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="+81 3-1234-5678">
                    </div>

                    <!-- Keywords -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Keywords (comma-separated)</label>
                        <input type="text" name="keywords" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="ramen, noodles, japanese, food">
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Separate keywords with commas for better search results</p>
                    </div>

                    <!-- Social Media -->
                    <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
                        <h3 class="text-lg font-semibold mb-3">Social Media (Optional)</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-2">Instagram</label>
                                <input type="text" name="instagram" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="username">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Facebook</label>
                                <input type="text" name="facebook" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="username">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">X (Twitter)</label>
                                <input type="text" name="x" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="username">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">TikTok</label>
                                <input type="text" name="tiktok" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="username">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">YouTube</label>
                                <input type="text" name="youtube" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="@username">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">LinkedIn</label>
                                <input type="text" name="linkedin" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-500" placeholder="username">
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button type="submit" class="w-full bg-yellow-400 text-gray-900 py-3 rounded-lg font-semibold hover:bg-yellow-500 transition-colors">
                            Add Business
                        </button>
                    </div>
                </form>

                <!-- Success/Error Message -->
                <div id="message" class="mt-4 hidden"></div>
            </div>

            <!-- Business List -->
            <div id="business-list-section" class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 hidden">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-gray-100">All Businesses</h2>
                <div id="businesses-container" class="space-y-4">
                    <!-- Businesses will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        // Tab switching
        const tabAdd = document.getElementById('tab-add');
        const tabList = document.getElementById('tab-list');
        const addSection = document.getElementById('add-business-section');
        const listSection = document.getElementById('business-list-section');

        tabAdd.addEventListener('click', () => {
            addSection.classList.remove('hidden');
            listSection.classList.add('hidden');
            tabAdd.classList.add('border-yellow-500', 'text-yellow-500');
            tabAdd.classList.remove('border-transparent', 'text-gray-500');
            tabList.classList.remove('border-yellow-500', 'text-yellow-500');
            tabList.classList.add('border-transparent', 'text-gray-500');
        });

        tabList.addEventListener('click', () => {
            listSection.classList.remove('hidden');
            addSection.classList.add('hidden');
            tabList.classList.add('border-yellow-500', 'text-yellow-500');
            tabList.classList.remove('border-transparent', 'text-gray-500');
            tabAdd.classList.remove('border-yellow-500', 'text-yellow-500');
            tabAdd.classList.add('border-transparent', 'text-gray-500');
            loadBusinesses();
        });

        // Handle form submission
        const businessForm = document.getElementById('business-form');
        const messageDiv = document.getElementById('message');

        businessForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(businessForm);
            
            // Build business object
            const business = {
                name: formData.get('name'),
                category: formData.get('category'),
                description: formData.get('description'),
                address: formData.get('address'),
                website: formData.get('website') || null,
                phone: formData.get('phone') || null,
                keywords: formData.get('keywords') 
                    ? formData.get('keywords').split(',').map(k => k.trim()).filter(k => k)
                    : [],
                socials: {
                    instagram: formData.get('instagram') || null,
                    facebook: formData.get('facebook') || null,
                    x: formData.get('x') || null,
                    tiktok: formData.get('tiktok') || null,
                    youtube: formData.get('youtube') || null,
                    linkedin: formData.get('linkedin') || null
                }
            };

            try {
                const response = await fetch(`${API_BASE_URL}/businesses`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(business)
                });

                const result = await response.json();

                if (result.success) {
                    messageDiv.className = 'mt-4 p-4 rounded-lg bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200';
                    messageDiv.textContent = `✓ Business added successfully! (ID: ${result.id})`;
                    messageDiv.classList.remove('hidden');
                    businessForm.reset();
                    
                    setTimeout(() => {
                        messageDiv.classList.add('hidden');
                    }, 5000);
                } else {
                    messageDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200';
                    messageDiv.textContent = `✗ Error: ${result.error}`;
                    messageDiv.classList.remove('hidden');
                }
            } catch (error) {
                messageDiv.className = 'mt-4 p-4 rounded-lg bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200';
                messageDiv.textContent = `✗ Error: ${error.message}. Make sure the backend server is running.`;
                messageDiv.classList.remove('hidden');
            }
        });

        // Load businesses
        async function loadBusinesses() {
            const container = document.getElementById('businesses-container');
            container.innerHTML = '<p class="text-gray-500">Loading businesses...</p>';

            try {
                const response = await fetch(`${API_BASE_URL}/businesses`);
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(business => `
                        <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-lg font-bold text-yellow-500 dark:text-yellow-400">${business.name}</h3>
                                    <p class="text-sm text-gray-500 dark:text-gray-400">${business.category}</p>
                                </div>
                                <span class="text-xs text-gray-400">ID: ${business.id}</span>
                            </div>
                            <p class="text-sm text-gray-600 dark:text-gray-300 mb-2">${business.description}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">📍 ${business.address}</p>
                            ${business.website ? `<p class="text-sm text-gray-500 dark:text-gray-400">🌐 <a href="${business.website}" target="_blank" class="text-yellow-500 hover:underline">${business.website}</a></p>` : ''}
                            ${business.phone ? `<p class="text-sm text-gray-500 dark:text-gray-400">📞 ${business.phone}</p>` : ''}
                            ${business.keywords && business.keywords.length > 0 ? `
                                <div class="mt-2 flex flex-wrap gap-1">
                                    ${business.keywords.map(keyword => `<span class="text-xs px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">${keyword}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-gray-500">No businesses found.</p>';
                }
            } catch (error) {
                container.innerHTML = `<p class="text-red-500">Error loading businesses: ${error.message}. Make sure the backend server is running.</p>`;
            }
        }
    </script>
</body>
</html>
